name: build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
      - run: flutter config --enable-windows-desktop
      # platforma fayllarini joriy Flutter'ga moslab qayta yaratamiz (VS/CMake migratsiya)
      - run: flutter create --platforms=windows --project-name aloqa .
      - run: flutter pub get
      - run: flutter build windows --release --dart-define=ALOQA_API_BASE=https://api.aloqa.ucms.uz/api/v1 --dart-define=ALOQA_LIVEKIT_URL=wss://rtc.aloqa.ucms.uz
      - name: Zip
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath aloqa-windows-1.0.0.zip
      - uses: actions/upload-artifact@v4
        with:
          name: aloqa-windows
          path: aloqa-windows-1.0.0.zip

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
      - run: flutter config --enable-macos-desktop
      - run: flutter create --platforms=macos --project-name aloqa .
      - run: flutter pub get
      - run: flutter build macos --release --dart-define=ALOQA_API_BASE=https://api.aloqa.ucms.uz/api/v1 --dart-define=ALOQA_LIVEKIT_URL=wss://rtc.aloqa.ucms.uz
      - name: DMG
        run: |
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          hdiutil create -volname ALOQA -srcfolder "$APP" -ov -format UDZO aloqa-macos-1.0.0.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: aloqa-macos
          path: aloqa-macos-1.0.0.dmg
